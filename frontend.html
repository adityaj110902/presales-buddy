<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PreSales Buddy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #ffffff;
        }
        
        #root {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #ffffff;
        }
        
        /* ===== HEADER ===== */
        .header {
            background: #ffffff;
            border-bottom: 1px solid #e5e5e5;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-icon {
            width: 36px;
            height: 36px;
            background: #c2185b;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }
        
        .header-text h1 {
            font-size: 18px;
            font-weight: 700;
            color: #1f1f1f;
            margin: 0;
            line-height: 1.2;
        }
        
        .header-text p {
            font-size: 11px;
            color: #999;
            margin: 0;
            line-height: 1.2;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #666;
            font-weight: 500;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            background: #4caf50;
            border-radius: 50%;
            display: inline-block;
        }
        
        .status-dot.offline {
            background: #ff9800;
        }
        
        .status-dot.error {
            background: #f44336;
        }
        
        /* ===== MAIN ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* ===== CHAT AREA ===== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }
        
        .chat-area::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-area::-webkit-scrollbar-track {
            background: #fafafa;
        }
        
        .chat-area::-webkit-scrollbar-thumb {
            background: #d5d5d5;
            border-radius: 3px;
        }
        
        .chat-area::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
        
        /* ===== EMPTY STATE ===== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            gap: 8px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 48px;
            opacity: 0.5;
        }
        
        .empty-state-title {
            font-size: 20px;
            font-weight: 600;
            color: #1f1f1f;
        }
        
        .empty-state-subtitle {
            font-size: 13px;
            color: #999;
        }
        
        .suggested-questions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 16px;
        }
        
        .question-btn {
            background: #f5f5f5;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 13px;
            color: #1f1f1f;
            transition: all 0.2s;
            font-weight: 500;
            text-align: left;
        }
        
        .question-btn:hover {
            background: #f0f0f0;
            border-color: #c2185b;
            color: #c2185b;
        }
        
        .question-btn:active {
            background: #e5e5e5;
        }
        
        .question-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* ===== MESSAGES ===== */
        .message {
            display: flex;
            margin-bottom: 6px;
            animation: slideIn 0.2s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message-content {
            padding: 10px 14px;
            border-radius: 6px;
            max-width: 65%;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 13px;
        }
        
        .user-message {
            background: #c2185b;
            color: white;
            margin-left: auto;
            border-radius: 6px 3px 6px 6px;
        }
        
        .assistant-message {
            background: #f5f5f5;
            color: #1f1f1f;
            border-radius: 3px 6px 6px 6px;
        }
        
        .message-source {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        
        /* ===== INPUT ===== */
        .input-section {
            border-top: 1px solid #e5e5e5;
            background: #ffffff;
            padding: 12px 20px;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .input-field {
            flex: 1;
            background: #f5f5f5;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            color: #1f1f1f;
            transition: all 0.2s;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #c2185b;
            background: #ffffff;
        }
        
        .input-field::placeholder {
            color: #999;
        }
        
        .input-field:disabled {
            background: #f0f0f0;
            cursor: not-allowed;
        }
        
        .send-btn {
            background: #c2185b;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 18px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 80px;
            height: 40px;
        }
        
        .send-btn:hover {
            background: #a01849;
        }
        
        .send-btn:active {
            background: #8b1540;
        }
        
        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        /* ===== FOOTER ===== */
        .footer {
            display: flex;
            justify-content: flex-start;
            gap: 20px;
            padding: 8px 20px;
            border-top: 1px solid #e5e5e5;
            font-size: 11px;
            color: #999;
            background: #ffffff;
            flex-shrink: 0;
        }
        
        .footer-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .footer-value {
            color: #1f1f1f;
            font-weight: 600;
        }
        
        /* ===== LOADING ===== */
        .typing {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #999;
            padding: 8px 14px;
        }
        
        .typing-dot {
            width: 6px;
            height: 6px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        
        .typing-dot:nth-child(1) { animation-delay: 0ms; }
        .typing-dot:nth-child(2) { animation-delay: 200ms; }
        .typing-dot:nth-child(3) { animation-delay: 400ms; }
        
        @keyframes bounce {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }
        
        .error-msg {
            background: #fff5f5;
            border: 1px solid #ffcccc;
            border-left: 3px solid #f44336;
            border-radius: 4px;
            padding: 10px 14px;
            color: #c62828;
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .message-content {
                max-width: 85%;
            }
            
            .send-btn {
                min-width: 60px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- HEADER -->
        <div class="header">
            <div class="header-left">
                <div class="header-icon">💼</div>
                <div class="header-text">
                    <h1>PreSales Buddy</h1>
                    <p>Sales Intelligence Assistant</p>
                </div>
            </div>
            <div class="header-right">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">LOADING</span>
            </div>
        </div>
        
        <!-- MAIN -->
        <div class="main">
            <!-- CHAT AREA -->
            <div class="chat-area" id="chatArea"></div>
            
            <!-- INPUT SECTION -->
            <div class="input-section">
                <input 
                    type="text" 
                    id="inputField" 
                    class="input-field" 
                    placeholder="Ask a question..."
                    onkeypress="handleKeyPress(event)"
                >
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
        
        <!-- FOOTER -->
        <div class="footer">
            <div class="footer-item">
                <span>📁</span>
                <span><span class="footer-value" id="docCount">0</span> documents</span>
            </div>
            <div class="footer-item">
                <span>💬</span>
                <span><span class="footer-value" id="msgCount">0</span> messages</span>
            </div>
            <div class="footer-item">
                <span id="statusIcon">🟡</span>
                <span id="statusLabel">Connecting...</span>
            </div>
        </div>
    </div>
    
    <script>
        // CONFIG
        const API_URL = 'https://presales-buddy.onrender.com';  // Change to your server IP
        
        let messages = [];
        let isLoading = false;
        let backendReady = false;
        let documentsCount = 0;
        
        const chatArea = document.getElementById('chatArea');
        const inputField = document.getElementById('inputField');
        const sendBtn = document.getElementById('sendBtn');
        const msgCount = document.getElementById('msgCount');
        const docCount = document.getElementById('docCount');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const statusIcon = document.getElementById('statusIcon');
        const statusLabel = document.getElementById('statusLabel');
        
        // ===== INIT =====
        async function initBackend() {
            try {
                const res = await fetch(`${API_URL}/status`);
                const data = await res.json();
                
                backendReady = true;
                documentsCount = data.documents_count;
                docCount.textContent = documentsCount;
                
                statusDot.classList.remove('offline', 'error');
                statusDot.classList.add('online');
                statusText.textContent = 'AI ASSISTANT';
                statusIcon.textContent = '🟢';
                statusLabel.textContent = 'Ready';
                
                console.log('Backend connected!', data);
            } catch (error) {
                console.error('Backend connection failed:', error);
                backendReady = false;
                
                statusDot.classList.add('error');
                statusText.textContent = 'OFFLINE';
                statusIcon.textContent = '🔴';
                statusLabel.textContent = 'Offline';
                
                showError('Backend connection failed. Make sure the Flask server is running on port 5000.');
            }
        }
        
        function showEmptyState() {
            return messages.length === 0;
        }
        
        function renderChat() {
            if (showEmptyState()) {
                chatArea.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <div class="empty-state-title">Start a Conversation</div>
                        <div class="empty-state-subtitle">Ask about products, pricing, or sales strategies</div>
                        
                        <div class="suggested-questions">
                            <button class="question-btn" onclick="askQuestion('📋 Tell me about our product features')" ${!backendReady ? 'disabled' : ''}>📋 Tell me about our product features</button>
                            <button class="question-btn" onclick="askQuestion('📈 What pricing plans do we offer?')" ${!backendReady ? 'disabled' : ''}>📈 What pricing plans do we offer?</button>
                            <button class="question-btn" onclick="askQuestion('🎯 How do we compare to competitors?')" ${!backendReady ? 'disabled' : ''}>🎯 How do we compare to competitors?</button>
                        </div>
                    </div>
                `;
            } else {
                let html = '';
                for (let msg of messages) {
                    if (msg.role === 'user') {
                        html += `
                            <div class="message">
                                <div class="message-content user-message">${escapeHtml(msg.content)}</div>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="message">
                                <div class="message-content assistant-message">
                                    ${escapeHtml(msg.content)}
                                    <div class="message-source">📄 ${msg.source || 'Knowledge Base'}</div>
                                </div>
                            </div>
                        `;
                    }
                }
                
                if (isLoading) {
                    html += `
                        <div class="typing">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    `;
                }
                
                chatArea.innerHTML = html;
                chatArea.scrollTop = chatArea.scrollHeight;
            }
            
            msgCount.textContent = messages.length;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showError(message) {
            const errorHtml = `<div class="error-msg">❌ ${message}</div>`;
            chatArea.innerHTML = errorHtml + chatArea.innerHTML;
        }
        
        async function askQuestion(question) {
            inputField.value = question;
            await sendMessage();
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !isLoading && backendReady) {
                sendMessage();
            }
        }
        
        async function sendMessage() {
            const text = inputField.value.trim();
            
            if (!text || isLoading || !backendReady) return;
            
            // Add user message
            messages.push({ role: 'user', content: text });
            inputField.value = '';
            isLoading = true;
            sendBtn.disabled = true;
            inputField.disabled = true;
            renderChat();
            
            try {
                // Call backend API
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: text })
                });
                
                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.success) {
                    messages.push({
                        role: 'assistant',
                        content: data.response,
                        source: data.source
                    });
                } else {
                    showError(data.error || 'Failed to get response');
                }
                
            } catch (error) {
                console.error('Error:', error);
                showError(error.message || 'Failed to connect to backend');
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                inputField.disabled = false;
                renderChat();
                inputField.focus();
            }
        }
        
        // Initialize on load
        window.addEventListener('load', () => {
            console.log('Frontend loaded, connecting to backend...');
            initBackend();
            renderChat();
            inputField.focus();
        });
    </script>
</body>
</html>
